<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="yGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Y Shape -->
  <g id="y-shape">
    <!-- Left arm -->
    <path d="M 70 60 Q 60 85 100 110" stroke="url(#yGradient)" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Right arm -->
    <path d="M 130 60 Q 140 85 100 110" stroke="url(#yGradient)" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Center stem -->
    <path d="M 100 110 L 100 160" stroke="url(#yGradient)" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Decorative arc -->
  <path d="M 50 100 Q 100 60 150 100" stroke="url(#arcGradient)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Arrow accent -->
  <g id="arrow">
    <path d="M 140 40 L 160 35 L 155 55" fill="url(#arcGradient)" stroke="none"/>
  </g>
</svg>
